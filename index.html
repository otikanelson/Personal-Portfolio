                    apk: null,
                    icon: 'images/CFC Logo.jpeg',
                    screenshots: ['images/CFC wallet_1.jpeg', 'images/CFC wallet_2.jpeg', 'images/CFC wallet_3.jpeg', 'images/CFC wallet_4.jpeg', 'images/CFC wallet_5.jpeg', 'images/CFC wallet_6.jpeg']

            function populatePanel(panel, projectId) {
                const p = PROJECTS[projectId];
                if (!p) return;
                panel.querySelector('.detail-icon').src = p.icon;
                panel.querySelector('.detail-icon').alt = p.name;
                panel.querySelector('.detail-name').textContent = p.name;
                panel.querySelector('.detail-subtitle').textContent = p.subtitle;
                panel.querySelector('.d-rating').textContent = p.rating;
                panel.querySelector('.d-downloads').textContent = p.downloads;
                panel.querySelector('.d-category').textContent = p.category;
                panel.querySelector('.detail-description').textContent = p.description;
                panel.querySelector('.detail-github').href = p.github;
                panel.querySelector('.detail-tags').innerHTML =
                    p.tags.map(t => `<span class="app-tag">${t}</span>`).join('');
                panel.querySelector('.screenshots-strip').innerHTML =
                    p.screenshots.map(src =>
                        `<img class="screenshot-img" src="${src}" alt="${p.name}" loading="lazy">`
                    ).join('');

                const dlBtn = panel.querySelector('.detail-download-btn');
                if (p.apk) {
                    dlBtn.style.display = 'inline-flex';
                    dlBtn.dataset.apk = p.apk;
                    dlBtn.dataset.name = p.name;
                    if (p.apk.includes('play.google.com')) {
                        dlBtn.innerHTML = '<i class="fab fa-google-play"></i> View on Play Store';
                    } else {
                        dlBtn.innerHTML = '<i class="fas fa-download"></i> Download APK';
                    }
                } else {
                    dlBtn.style.display = 'none';
                }
            }

            // ─── CERTIFICATIONS ─────────────────────────────────────────
            const certImages = [
                { src: 'images/certifications/Cisco.webp', title: 'Cisco — Introduction to Cybersecurity' },
                { src: 'images/certifications/Cisco (2).webp', title: 'Cisco — Networking Basics' },
                { src: 'images/certifications/Cisco (3).webp', title: 'Cisco — Network Technician' },
                { src: 'images/certifications/Cisco (4).webp', title: 'Cisco — Networking Devices & Initial Config' },
                { src: 'images/certifications/Bsc.png', title: 'BSc Software Engineering — Babcock University' },
                { src: 'images/certifications/CPN.png', title: 'CPN — Computer Professionals (Nigeria)' },
                { src: 'images/certifications/New Horizon.png', title: 'New Horizons — IT Training' },
                { src: 'images/certifications/NIIT.png', title: 'NIIT — Mobile App Development' },
            ];
            for (let i = certImages.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [certImages[i], certImages[j]] = [certImages[j], certImages[i]];
            }
            const certsGrid = document.getElementById('certsGrid');
            if (certsGrid) {
                certImages.forEach(({ src, title }, index) => {
                    const card = document.createElement('div');
                    card.className = 'cert-card';
                    card.innerHTML = `
                        <img src="${src}" alt="${title}" class="cert-img" loading="lazy">
                        <span class="cert-title">${title}</span>
                    `;
                    card.addEventListener('click', () => {
                        const certSrcs = certImages.map(c => c.src);
                        openLightbox(certSrcs, index);
                    });
                    certsGrid.appendChild(card);
                });
            }

            // ─── APK MODAL ───────────────────────────────────────────────
            const modal = document.getElementById('apkModal');
            if (modal) {
                const confirmBtn = modal.querySelector('.apk-confirm-btn');
                const cancelBtn = modal.querySelector('.apk-cancel-btn');

                function openApkModal(apkHref, appName) {
                    confirmBtn.href = apkHref;
                    confirmBtn.dataset.downloadUrl = apkHref;
                    modal.classList.add('visible');
                    document.body.style.overflow = 'hidden';
                }

                function closeApkModal() {
                    modal.classList.remove('visible');
                    document.body.style.overflow = '';
                }

                cancelBtn.addEventListener('click', closeApkModal);
                confirmBtn.addEventListener('click', (e) => {
                    e.preventDefault();
                    e.stopPropagation();
                    const downloadUrl = confirmBtn.dataset.downloadUrl || confirmBtn.href;
                    if (downloadUrl && downloadUrl !== '#' && downloadUrl !== window.location.href + '#') {
                        window.open(downloadUrl, '_blank', 'noopener,noreferrer');
                        setTimeout(closeApkModal, 300);
                    }
                });
                modal.addEventListener('click', e => { if (e.target === modal) closeApkModal(); });
                document.addEventListener('keydown', e => { if (e.key === 'Escape') closeApkModal(); });

                const mobileRowEl = document.querySelector('.mobile-row');
                if (mobileRowEl) {
                    mobileRowEl.addEventListener('click', e => {
                        const btn = e.target.closest('.detail-download-btn');
                        if (!btn) return;
                        e.preventDefault();
                        const apkUrl = btn.dataset.apk;
                        if (apkUrl && apkUrl.includes('play.google.com')) {
                            window.open(apkUrl, '_blank', 'noopener,noreferrer');
                        } else {
                            openApkModal(apkUrl, btn.dataset.name);
                        }
                    });
                }
            }

            // ─── MOBILE ROW — hover-driven ───────────────────────────────
            const mobileRow = document.querySelector('.mobile-row');
            if (mobileRow) {
                const panel = mobileRow.querySelector('.project-detail-panel');
                const tiles = mobileRow.querySelectorAll('.app-tile:not(.view-more-tile)');
                let leaveTimer = null;

                tiles.forEach(tile => {
                    tile.dataset.hasListener = 'true';
                    tile.addEventListener('mouseenter', () => {
                        clearTimeout(leaveTimer);
                        tiles.forEach(t => t.classList.remove('is-focused'));
                        tile.classList.add('is-focused');
                        mobileRow.classList.add('tile-focused');
                        populatePanel(panel, tile.dataset.project);
                    });
                });

                mobileRow.addEventListener('mouseleave', () => {
                    leaveTimer = setTimeout(() => {
                        tiles.forEach(t => t.classList.remove('is-focused'));
                        mobileRow.classList.remove('tile-focused');
                    }, 300);
                });

                mobileRow.addEventListener('mouseenter', () => {
                    clearTimeout(leaveTimer);
                });
            }

            // ─── IMAGE LIGHTBOX ──────────────────────────────────────────
            const lightboxOverlay = document.getElementById('imageLightbox');
            if (lightboxOverlay) {
                const lightboxImage = lightboxOverlay.querySelector('.lightbox-image');
                const lightboxPrev = lightboxOverlay.querySelector('.lightbox-prev');
                const lightboxNext = lightboxOverlay.querySelector('.lightbox-next');
                let currentImageIndex = 0;
                let currentProjectImages = [];

                function openLightbox(images, index) {
                    currentProjectImages = images;
                    currentImageIndex = index;
                    lightboxImage.src = images[index];
                    lightboxOverlay.classList.add('visible');
                    document.body.style.overflow = 'hidden';
                }

                function closeLightbox() {
                    lightboxOverlay.classList.remove('visible');
                    document.body.style.overflow = '';
                }

                function showImage(index) {
                    if (index < 0) {
                        currentImageIndex = currentProjectImages.length - 1;
                    } else if (index >= currentProjectImages.length) {
                        currentImageIndex = 0;
                    } else {
                        currentImageIndex = index;
                    }
                    lightboxImage.src = currentProjectImages[currentImageIndex];
                }

                lightboxPrev.addEventListener('click', () => showImage(currentImageIndex - 1));
                lightboxNext.addEventListener('click', () => showImage(currentImageIndex + 1));
                lightboxOverlay.addEventListener('click', (e) => {
                    if (e.target === lightboxOverlay) closeLightbox();
                });
                document.addEventListener('keydown', (e) => {
                    if (!lightboxOverlay.classList.contains('visible')) return;
                    if (e.key === 'Escape') closeLightbox();
                    if (e.key === 'ArrowLeft') showImage(currentImageIndex - 1);
                    if (e.key === 'ArrowRight') showImage(currentImageIndex + 1);
                });

                document.addEventListener('click', (e) => {
                    const screenshotImg = e.target.closest('.screenshot-img');
                    if (!screenshotImg) return;

                    const panel = screenshotImg.closest('.project-detail-panel');
                    const allScreenshots = panel.querySelectorAll('.screenshot-img');
                    const images = Array.from(allScreenshots).map(img => img.src);
                    const index = Array.from(allScreenshots).indexOf(screenshotImg);

                    openLightbox(images, index);
                });

                window.openLightbox = openLightbox;
            }

            // ─── CONTACT FORM (EmailJS) ──────────────────────────────────
            (function () {
                emailjs.init('YOUR_PUBLIC_KEY');
            })();

            const contactForm = document.getElementById('contactForm');
            if (contactForm) {
                contactForm.addEventListener('submit', function (e) {
                    e.preventDefault();
                    const btn = document.getElementById('submitBtn');
                    const status = document.getElementById('formStatus');
                    btn.disabled = true;
                    btn.innerHTML = 'Sending… <i class="fas fa-spinner fa-spin"></i>';
                    status.textContent = '';
                    status.className = 'form-status';

                    emailjs.send('YOUR_SERVICE_ID', 'YOUR_TEMPLATE_ID', {
                        from_name: document.getElementById('from_name').value,
                        from_email: document.getElementById('from_email').value,
                        subject: document.getElementById('subject').value,
                        message: document.getElementById('message').value,
                    }).then(() => {
                        status.textContent = 'Message sent! I\'ll get back to you soon.';
                        status.className = 'form-status success';
                        this.reset();
                        btn.disabled = false;
                        btn.innerHTML = 'Send Message <i class="fas fa-paper-plane"></i>';
                    }).catch(() => {
                        status.textContent = 'Something went wrong. Please email me directly.';
                        status.className = 'form-status error';
                        btn.disabled = false;
                        btn.innerHTML = 'Send Message <i class="fas fa-paper-plane"></i>';
                    });
                });
            }

            // ─── WEB TILE CAROUSELS ──────────────────────────────────────
            const webTiles = document.querySelectorAll('.web-stage .web-tile');

            webTiles.forEach(tile => {
                const preview = tile.querySelector('.web-tile-preview');
                if (!preview) return;
                const slides = preview.querySelectorAll('.web-carousel-slide');
                const dotsContainer = preview.querySelector('.web-carousel-dots');

                if (slides.length <= 1) return;

                let currentSlide = 0;
                let autoplayInterval = null;

                slides.forEach((_, index) => {
                    const dot = document.createElement('div');
                    dot.className = 'web-carousel-dot';
                    if (index === 0) dot.classList.add('active');
                    dot.addEventListener('click', (e) => {
                        e.stopPropagation();
                        goToSlide(index);
                    });
                    dotsContainer.appendChild(dot);
                });

                const dots = dotsContainer.querySelectorAll('.web-carousel-dot');

                function goToSlide(index) {
                    slides[currentSlide].classList.remove('active');
                    if (dots[currentSlide]) dots[currentSlide].classList.remove('active');

                    currentSlide = index;

                    slides[currentSlide].classList.add('active');
                    if (dots[currentSlide]) dots[currentSlide].classList.add('active');
                }

                function nextSlide() {
                    const next = (currentSlide + 1) % slides.length;
                    goToSlide(next);
                }

                function startAutoplay() {
                    if (autoplayInterval) clearInterval(autoplayInterval);
                    autoplayInterval = setInterval(nextSlide, 3000);
                }

                function stopAutoplay() {
                    clearInterval(autoplayInterval);
                    autoplayInterval = null;
                    goToSlide(0);
                }

                tile.startCarousel = startAutoplay;
                tile.stopCarousel = stopAutoplay;
            });

            // ─── WEB CARD INTERACTION ────────────────────────────────────
            function updateActiveWebCard(activeTile) {
                webTiles.forEach(t => {
                    if (t === activeTile) {
                        t.classList.add('active');
                        if (typeof t.startCarousel === 'function') {
                            t.startCarousel();
                        }
                    } else {
                        t.classList.remove('active');
                        if (typeof t.stopCarousel === 'function') {
                            t.stopCarousel();
                        }
                    }
                });
            }

            const initialActive = document.querySelector('.web-stage .web-tile.active');
            if (initialActive && typeof initialActive.startCarousel === 'function') {
                initialActive.startCarousel();
            }

            webTiles.forEach(tile => {
                tile.addEventListener('mouseenter', () => {
                    updateActiveWebCard(tile);
                });
            });

            // ─── DESKTOP CAROUSEL ────────────────────────────────────────
            (function () {
                const carousel = document.querySelector('.desktop-carousel');
                if (!carousel) return;

                const slides = carousel.querySelectorAll('.carousel-slide');
                const dotsContainer = carousel.querySelector('.carousel-dots');
                const prevBtn = carousel.querySelector('.prev-btn');
                const nextBtn = carousel.querySelector('.next-btn');

                let currentSlide = 0;
                let autoplayInterval;

                slides.forEach((_, index) => {
                    const dot = document.createElement('div');
                    dot.className = 'carousel-dot';
                    if (index === 0) dot.classList.add('active');
                    dot.addEventListener('click', () => goToSlide(index));
                    dotsContainer.appendChild(dot);
                });

                const dots = dotsContainer.querySelectorAll('.carousel-dot');

                function goToSlide(index) {
                    slides[currentSlide].classList.remove('active');
                    dots[currentSlide].classList.remove('active');

                    currentSlide = index;

                    slides[currentSlide].classList.add('active');
                    dots[currentSlide].classList.add('active');

                    resetAutoplay();
                }

                function nextSlide() {
                    const next = (currentSlide + 1) % slides.length;
                    goToSlide(next);
                }

                function prevSlide() {
                    const prev = (currentSlide - 1 + slides.length) % slides.length;
                    goToSlide(prev);
                }

                function startAutoplay() {
                    autoplayInterval = setInterval(nextSlide, 4000);
                }

                function stopAutoplay() {
                    clearInterval(autoplayInterval);
                }

                function resetAutoplay() {
                    stopAutoplay();
                    startAutoplay();
                }

                nextBtn.addEventListener('click', nextSlide);
                prevBtn.addEventListener('click', prevSlide);

                carousel.addEventListener('mouseenter', stopAutoplay);
                carousel.addEventListener('mouseleave', startAutoplay);

                document.addEventListener('keydown', (e) => {
                    if (!carousel.matches(':hover')) return;
                    if (e.key === 'ArrowLeft') prevSlide();
                    if (e.key === 'ArrowRight') nextSlide();
                });

                startAutoplay();
            })();
        }

        // Initialize immediately if components are already loaded
        if (document.querySelector('#hero section')) {
            initializePortfolio();
        }
    </script>
</body>

</html>
